  <div id="layout-content"><div class="t-big-margin" style="margin-top: 10px;"><script>jiazai_dag_all('INDEX_PC_HENGFU')</script></div><div class="section" id="pthreads.installation">
  <h1 class="title">安装</h1>
  <p class="para">
   pthreads 扩展由 PECL 主持，使用 <a class="link external" href="https://github.com/krakjoe/pthreads">»&nbsp;github</a> 管理源代码。
   使用标准的 PECL 包安装方式就可以完成安装：<a class="link external" href="https://pecl.php.net/package/pthreads">»&nbsp;https://pecl.php.net/package/pthreads</a>。
  </p>
  <p class="para">
   Windows 用户可以从 <a class="link external" href="https://windows.php.net/downloads/pecl/releases/pthreads">»&nbsp;PECL</a> 下载已经构建的二进制发行包。
  </p>
  <div class="caution"><strong class="caution">警告</strong>
   <p class="para">
    Windows 用户需要将 pthreadVC2.dll （包含在 Windows 版二进制发行包中）所在路径加入到 <var class="envar">PATH</var> 环境变量中。
   </p>
  </div>
