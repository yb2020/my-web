  <h1 class="title">枚举常量</h1>

  <p class="para">
   仅管 enum 可以包括 public、private、protected 的常量，
   但由于它不支持继承，因此在实践中 private 和 protected 效果是相同的。
  </p>

  <p class="para">枚举常量可以引用枚举条目：</p>

  <div class="example-contents">
   <div class="phpcode"><code><span style="color: rgb(0, 0, 0);">
<span style="color: rgb(0, 0, 187);">&lt;?php<br>enum&nbsp;Size<br></span><span style="color: rgb(0, 119, 0);">{<br>&nbsp;&nbsp;&nbsp;&nbsp;case&nbsp;</span><span style="color: rgb(0, 0, 187);">Small</span><span style="color: rgb(0, 119, 0);">;<br>&nbsp;&nbsp;&nbsp;&nbsp;case&nbsp;</span><span style="color: rgb(0, 0, 187);">Medium</span><span style="color: rgb(0, 119, 0);">;<br>&nbsp;&nbsp;&nbsp;&nbsp;case&nbsp;</span><span style="color: rgb(0, 0, 187);">Large</span><span style="color: rgb(0, 119, 0);">;<br><br>&nbsp;&nbsp;&nbsp;&nbsp;public&nbsp;const&nbsp;</span><span style="color: rgb(0, 0, 187);">Huge&nbsp;</span><span style="color: rgb(0, 119, 0);">=&nbsp;</span><span style="color: rgb(0, 0, 187);">self</span><span style="color: rgb(0, 119, 0);">::</span><span style="color: rgb(0, 0, 187);">Large</span><span style="color: rgb(0, 119, 0);">;<br>}<br></span><span style="color: rgb(0, 0, 187);">?&gt;</span>
</span>
</code></div>
  </div>
