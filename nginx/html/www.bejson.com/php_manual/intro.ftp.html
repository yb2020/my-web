  <h1 class="title">简介</h1>
  <p class="para">
   本扩展中的函数实现了通过 FTP 协议访问文件服务器的客户端。
   FTP 协议在 <a class="link external" href="http://www.faqs.org/rfcs/rfc959">»&nbsp;http://www.faqs.org/rfcs/rfc959</a> 中定义。
   本扩展提供了对于 FTP 服务器完整的访问及控制功能。
   如果只是简单的从 FTP 服务器读取或向服务器写入一个文件，
   请考虑使用
   <a class="link" href="wrappers.ftp.html"><code class="literal">ftp://</code> 包装器</a>
