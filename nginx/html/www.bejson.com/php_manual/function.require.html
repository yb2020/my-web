 <h1 class="title">require</h1>
 <p class="verinfo">(PHP 4, PHP 5, PHP 7, PHP 8)</p>

 <p class="para">
  <code class="literal">require</code> 和 <span class="function"><a class="function" href="function.include.html">include</a></span>
  几乎完全一样，除了处理失败的方式不同之外。<span class="function"><strong>require</strong></span>
  在出错时产生 <strong><code>E_COMPILE_ERROR</code></strong>
  级别的错误。换句话说将导致脚本中止而 <span class="function"><a class="function" href="function.include.html">include</a></span>
  只产生警告（<strong><code>E_WARNING</code></strong>），脚本会继续运行。
 </p>
 <p class="para">
  参见 <span class="function"><a class="function" href="function.include.html">include</a></span> 文档了解详情。
 </p>
