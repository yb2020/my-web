 <h1>范例</h1>

 <p class="para">
  <div class="example" id="example-4615">
   <p><strong>示例 #1 合法模式示例</strong></p>
   <ul class="itemizedlist">
    <li class="listitem"><span class="simpara"><code class="literal">/&lt;\/\w+&gt;/</code></span></li>
    <li class="listitem"><span class="simpara"><code class="literal">|(\d{3})-\d+|Sm</code></span></li>
    <li class="listitem"><span class="simpara"><code class="literal">/^(?i)php[34]/</code></span></li>
    <li class="listitem"><span class="simpara"><code class="literal">{^\s+(\s+)?$}</code></span></li>
   </ul>
  </div>
 <p></p>
 <p class="para">
  <div class="example" id="example-4616">
   <p><strong>示例 #2 非法模式示例</strong></p>
   <ul class="itemizedlist">
    <li class="listitem">
     <span class="simpara">
      <code class="literal">/href='(.*)'</code> - 缺失结束分隔符
     </span>
    </li>
    <li class="listitem">
     <span class="simpara">
      <code class="literal">/\w+\s*\w+/J</code> - 未知模式修饰符"J"
     </span>
    </li>
    <li class="listitem">
     <span class="simpara">
      <code class="literal">1-\d3-\d3-\d4|</code> - 缺失开始分隔符
     </span>
    </li>
   </ul>
  </div>
