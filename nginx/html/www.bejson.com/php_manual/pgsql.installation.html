 <h1 class="title">安装</h1>
 <p class="para">

  <strong class="option configure">--with-pgsql[=DIR]</strong>
  选项。如果可以用共享模块方式，PostgreSQL 模块可以在
  <var class="filename">php.ini</var> 用 <a class="link" href="ini.core.html#ini.extension">extension</a>
  指令或者 <span class="function"><a class="function" href="function.dl.html">dl()</a></span> 函数加载。
