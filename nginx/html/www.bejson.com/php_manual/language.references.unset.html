  <div id="layout-content"><div class="t-big-margin" style="margin-top: 10px;"><script>jiazai_dag_all('INDEX_PC_HENGFU')</script></div><div class="sect1" id="language.references.unset">
  <h1 class="title">取消引用</h1>
  <p class="para">
   当 unset 一个引用，只是断开了变量名和变量内容之间的绑定。这并不意味着变量内容被销毁了。例如：
   <div class="informalexample">
    <div class="example-contents">
<div class="phpcode"><code><span style="color: rgb(0, 0, 0);">
<span style="color: rgb(0, 0, 187);">&lt;?php<br>$a&nbsp;</span><span style="color: rgb(0, 119, 0);">=&nbsp;</span><span style="color: rgb(0, 0, 187);">1</span><span style="color: rgb(0, 119, 0);">;<br></span><span style="color: rgb(0, 0, 187);">$b&nbsp;</span><span style="color: rgb(0, 119, 0);">=&amp;&nbsp;</span><span style="color: rgb(0, 0, 187);">$a</span><span style="color: rgb(0, 119, 0);">;<br>unset(</span><span style="color: rgb(0, 0, 187);">$a</span><span style="color: rgb(0, 119, 0);">);<br></span><span style="color: rgb(0, 0, 187);">?&gt;</span>
</span>
</code></div>
    </div>

   </div>
   不会 unset <var class="varname">$b</var>，只是 <var class="varname">$a</var>。
  <p></p>
  <p class="simpara">
   再拿这个和 Unix 的 <strong class="command">unlink</strong> 调用来类比一下可能有助于理解。
  </p>
