
<!doctype html>
<html>
<head><title>WWW SQL Designer</title>
    <meta
            name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="Content-Type" content="application/xml; charset=utf-8">
    <meta
            charset="utf-8"/>
    <link
            rel="stylesheet" href="/devtools/sqldesigner/styles/style.css?v=5" media="all"/>
    <!--[if IE 6]>
    <link
            rel="stylesheet" type="text/css" href="/devtools/sqldesigner/styles/ie6.css?v=4"/><![endif]-->
    <!--[if IE 7]>
    <link
            rel="stylesheet" type="text/css" href="/devtools/sqldesigner/styles/ie7.css?v=4"/><![endif]-->
    <link
            rel="stylesheet" href="/devtools/sqldesigner/styles/print.css?v=4" type="text/css" media="print"/>
    <script type="text/javascript">STATIC_PATH_LANG = "zh-CN";</script>
    <script src="/devtools/sqldesigner/js/oz.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/config.js?v=6"></script>
    <script src="/devtools/sqldesigner/js/globals.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/visual.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/row.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/table.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/relation.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/key.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/rubberband.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/map.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/toggle.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/io.js?v=7"></script>
    <script src="/devtools/sqldesigner/js/tablemanager.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/rowmanager.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/keymanager.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/window.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/options.js?v=4"></script>
    <script src="/devtools/sqldesigner/js/wwwsqldesigner.js?v=4"></script>
</head>
<body>
<div
        id="area"></div>
<div
        id="controls">
    <div
            id="bar">
        <div
                id="toggle"></div>
        <input
                type="button" id="saveload"/>
        <hr/>
        <input
                type="button" id="addtable"/>
        <input
                type="button" id="edittable"/>
        <input
                type="button" id="tablekeys"/>
        <input
                type="button" id="removetable"/>
        <input
                type="button" id="aligntables"/>
        <input
                type="button" id="cleartables"/>
        <hr/>
        <input
                type="button" id="addrow"/>
        <input
                type="button" id="editrow"/>
        <input
                type="button" id="uprow" class="small"/><input
            type="button" id="downrow" class="small"/>
        <input
                type="button" id="foreigncreate"/>
        <input
                type="button" id="foreignconnect"/>
        <input
                type="button" id="foreigndisconnect"/>
        <input
                type="button" id="removerow"/>
        <hr/>
        <input
                type="button" id="options"/>
        <a
                href="https://github.com/ondras/wwwsqldesigner/wiki" target="_blank"><input
                type="button" id="docs" value=""/></a></div>
    <div
            id="rubberband"></div>
    <div
            id="minimap"></div>
    <div
            id="background"></div>
    <div
            id="window">
        <div
                id="windowtitle"><img
                id="throbber" src="/tools/js/designer/images/throbber.gif" alt="" title=""/></div>
        <div
                id="windowcontent"></div>
        <input
                type="button" id="windowok"/>
        <input
                type="button" id="windowcancel"/></div>
</div>
<div
        id="opts">
    <table>
        <tbody>
        <tr>
            <td>
                * <label
                    id="language" for="optionlocale"></label></td>
            <td>
                <select
                        id="optionlocale">
                    <option></option>
                </select></td>
        </tr>
        <tr>
            <td>
                * <label
                    id="db" for="optiondb"></label></td>
            <td>
                <select
                        id="optiondb">
                    <option></option>
                </select></td>
        </tr>
        <tr>
            <td>
                <label
                        id="snap" for="optionsnap"></label></td>
            <td>
                <input
                        type="text" size="4" id="optionsnap"/>
                <span
                        class="small" id="optionsnapnotice"></span></td>
        </tr>
        <tr>
            <td>
                <label
                        id="pattern" for="optionpattern"></label></td>
            <td>
                <input
                        type="text" size="6" id="optionpattern"/>
                <span
                        class="small" id="optionpatternnotice"></span></td>
        </tr>
        <tr>
            <td>
                <label
                        id="hide" for="optionhide"></label></td>
            <td>
                <input
                        type="checkbox" id="optionhide"/></td>
        </tr>
        <tr>
            <td>
                * <label
                    id="vector" for="optionvector"></label></td>
            <td>
                <input
                        type="checkbox" id="optionvector"/></td>
        </tr>
        <tr>
            <td>
                * <label
                    id="showsize" for="optionshowsize"></label></td>
            <td>
                <input
                        type="checkbox" id="optionshowsize"/></td>
        </tr>
        <tr>
            <td>
                * <label
                    id="showtype" for="optionshowtype"></label></td>
            <td>
                <input
                        type="checkbox" id="optionshowtype"/></td>
        </tr>
        </tbody>
    </table>
    <hr
    />
    * <span
        class="small" id="optionsnotice"></span></div>
<div
        id="io">
    <table>
        <tbody>
        <tr>
            <td
                    style="width:54%">
                <fieldset>
                    <legend
                            id="client"></legend>
                    <div
                            id="singlerow">
                        <input
                                type="button" id="clientsave"/>
                        <input
                                type="button" id="clientload"/></div>
                    <div
                            id="singlerow">
                        <input
                                type="button" id="clientlocalsave"/>
                        <input
                                type="button" id="clientlocalload"/>
                        <input
                                type="button" id="clientlocallist"/></div>
                    <div
                            id="singlerow">
                        <input
                                type="button" id="dropboxsave"/>
                        <input
                                type="button" id="dropboxload"/>
                        <input
                                type="button" id="dropboxlist"/></div>
                    <hr/>
                    <input
                            type="button" id="clientsql"/></fieldset>
            </td>
            <td
                    style="width:40%;display: none">
                <fieldset>
                    <legend
                            id="server"></legend>
                    <label
                            for="backend" id="backendlabel"></label> <select
                        id="backend">
                    <option></option>
                </select>
                    <hr/>
                    <input
                            type="button" id="serversave"/>
                    <input
                            type="button" id="serverload"/></fieldset>
            </td>
        </tr>
        <tr>
            <td
                    colspan="2">
                <fieldset>
                    <legend
                            id="output"></legend>
                    <textarea id="textarea" rows="1" cols="1"></textarea></fieldset>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div
        id="keys">
    <fieldset>
        <legend
                id="keyslistlabel"></legend>
        <select
                id="keyslist">
            <option></option>
        </select>
        <input
                type="button" id="keyadd"/>
        <input
                type="button" id="keyremove"/></fieldset>
    <fieldset>
        <legend
                id="keyedit"></legend>
        <table>
            <tbody>
            <tr>
                <td>
                    <label
                            for="keytype" id="keytypelabel"></label>
                    <select
                            id="keytype">
                        <option></option>
                    </select></td>
                <td></td>
                <td>
                    <label
                            for="keyname" id="keynamelabel"></label>
                    <input
                            type="text" id="keyname" size="10"/></td>
            </tr>
            <tr>
                <td
                        colspan="3">
                    <hr/>
                </td>
            </tr>
            <tr>
                <td>
                    <label
                            for="keyfields" id="keyfieldslabel"></label><br/>
                    <select
                            id="keyfields" size="5" multiple="multiple">
                        <option></option>
                    </select></td>
                <td>
                    <input
                            type="button" id="keyleft" value="&lt;&lt;"/><br/>
                    <input
                            type="button" id="keyright" value="&gt;&gt;"/><br/></td>
                <td>
                    <label
                            for="keyavail" id="keyavaillabel"></label><br/>
                    <select
                            id="keyavail" size="5" multiple="multiple">
                        <option></option>
                    </select></td>
            </tr>
            </tbody>
        </table>
    </fieldset>
</div>
<div
        id="table">
    <table>
        <tbody>
        <tr>
            <td>
                <label
                        id="tablenamelabel" for="tablename"></label></td>
            <td>
                <input
                        id="tablename" type="text"/></td>
        </tr>
        <tr>
            <td>
                <label
                        id="tablecommentlabel" for="tablecomment"></label></td>
            <td><textarea rows="5" cols="40" id="tablecomment"></textarea></td>
        </tr>
        </tbody>
    </table>
</div>
<script type="text/javascript" src="/devtools/sqldesigner/js/jquery.min.js"></script>
<script type="text/javascript">var d = new SQL.Designer();
$(function () {
    $("body").delegate("input", "click", function () {
        $(this).select();
    });
})</script>
</body>
</html>
