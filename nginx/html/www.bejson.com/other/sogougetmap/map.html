<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>搜狗地图拾取器 - Bejson.com</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta name="Keywords" content="搜狗地图拾取器,搜狗地图拾取坐标系统"/>
    <meta name="Description" content="搜狗地图拾取器,点击地图上某点,都会将坐标显示在地图旁边的Input框中,然后可以右键复制我们选择的地址！"/>
    <link rel="stylesheet" href="/other/sogougetmap/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/network/topology/css/common.css"/>
    <link rel="stylesheet" href="/network/topology/css/jquery-ui.min.css">
    <script type="text/javascript" src="/static/bejson/js/component/ueditor/third-party/jquery-1.10.2.js"></script>
    <script type="text/javascript" src="/network/topology/css/bootstrap.js"></script>
    <script type="text/javascript" src="/static/bejson/application/login/js/layer.js"></script>
    <script type="text/javascript" src="/network/topology/js/jquery-ui.js"></script>
    <script type="text/javascript" src="/network/topology/js/jquery.form.js"></script>

</head>
<body>
<script type="text/javascript" src="/other/sogougetmap/js/api.js"></script>
<style>
    .keywords {
        width: 210px !important;
        display: inline-block !important;
    }
</style>
<div class="container">
    <h1></h1>
    <ul id="myTab" class="nav nav-tabs">
        <li class="active">
            <a href="#main" data-toggle="tab">搜狗地图拾取器</a>
        </li>

    </ul>
    <div id="myTabContent" class="tab-content">
        <div class='tab-pane fade in active' style="margin-top: 5px;" id="main">
            <div class="col-lg-5 col-xs-12">
                <input type="text" class="form-control keywords" id="keywords" name="keywords" placeholder="搜索地址">
                <input type="button" class="btn btn-success" value="搜索" onclick="search()">
            </div>
            <div class="col-lg-12 col-md-12 col-xs-12"></div>
            <div class="col-lg-8 col-md-8 col-xs-12 top15">
                <div id="map" style="width: 100%;height: 500px;"></div>
            </div>
            <div class="col-lg-4 col-md-4 col-xs-12 top15">
                <textarea class="form-control" rows="20" id="result"></textarea>
            </div>
        </div>

    </div>
</div>
<script>
    var map;
    var marker = null;
    $(function () {
        sogouinit()
    });

    function sogouinit() {
        var myLatlng = new sogou.maps.LatLng(39.992792, 116.326142);
        var myOptions = {
            zoom: 12,
            center: myLatlng,
            mapTypeId: sogou.maps.MapTypeId.ROADMAP
        }
        map = new sogou.maps.Map(document.getElementById("map"), myOptions);
        sogou.maps.event.addListener(map, 'click', function (event) {
            var x = event.point['x'], y = event.point['y'];
            var myPoint = new sogou.maps.Point(x, y);
            var text = "您点击位置搜狗坐标:" + x + ',' + y + "" + "\r\n" + $('#result').val();

            $('#result').val(text);
            placeMarker(event.point);
        });
    }

    function callback(a) {
        if (marker) {
            marker.setMap(null);
        }
        if (a.status == 'ok') {
            var data = a.data;
            for (var i = 0; i < data.length; i++) {
                var geometry = a.data[0];
                marker = new sogou.maps.Marker({
                    map: map,
                    title: geometry.address,
                    label: {
                        title: geometry.address,
                        visible: true
                    },
                    position: geometry.location,
                    visible: true
                });

                map.setCenter(marker.getPosition());
            }
        }

    }

    function search() {
        var kw = $('#keywords').val();
        var request = {
            address: {
                addr: kw,
                city: "全国"
            }
        };
        var geo = new sogou.maps.Geocoder();
        geo.geocode(request, callback);
    }

    function placeMarker(location) {
        var clickedLocation = location;
        var marker = new sogou.maps.Marker({
            position: location,
            map: map
        });
        map.setCenter(location);
    }
</script>

</body>
</html>
