<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>高德地图拾取器 - Bejson.com</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta name="Keywords" content="高德地图拾取器,高德地图拾取坐标系统"/>
    <meta name="Description" content="高德地图拾取器,点击地图上某点,都会将坐标显示在地图旁边的Input框中,然后可以右键复制我们选择的地址！"/>
    <link rel="stylesheet" href="/other/sogougetmap/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/network/topology/css/common.css"/>
    <link rel="stylesheet" href="/network/topology/css/jquery-ui.min.css">
    <script type="text/javascript" src="/static/bejson/js/component/ueditor/third-party/jquery-1.10.2.js"></script>
    <script type="text/javascript" src="/network/topology/css/bootstrap.js"></script>
    <script type="text/javascript" src="/static/bejson/application/login/js/layer.js"></script>
    <script type="text/javascript" src="/network/topology/js/jquery-ui.js"></script>
    <script type="text/javascript" src="/network/topology/js/jquery.form.js"></script>
</head>
<body>
<link rel="stylesheet" href="https://a.amap.com/jsapi_demos/static/demo-center/css/demo-center.css"/>
<script type="text/javascript">
    window._AMapSecurityConfig = {
        securityJsCode:'ec35ec8f77abfc836aebe540cbf250ca',
    }
</script>
<script type="text/javascript"
        src="https://webapi.amap.com/maps?v=1.4.15&key=7a9e75f0f725782164aa265777f7bae1&plugin=AMap.Autocomplete,AMap.PlaceSearch,AMap.Geocoder"></script>
<script src="https://a.amap.com/jsapi_demos/static/demo-center/js/demoutils.js"></script>
<script type="text/javascript" src="https://cache.amap.com/lbs/static/addToolbar.js"></script>
<style>
    .keywords {
        width: 210px !important;
        display: inline-block !important;
    }
</style>
<div class="container">
    <h1>高德地图拾取器</h1>
    <ul id="myTab" class="nav nav-tabs">
        <li class="active">
            <a href="#main" data-toggle="tab">Home</a>
        </li>

    </ul>
    <div id="myTabContent" class="tab-content">
        <div class='tab-pane fade in active' style="margin-top: 5px;" id="main">
            <div class="col-lg-5 col-xs-12">
                <input type="text" class="form-control keywords" id="keywords" name="keywords" placeholder="搜索地址">
                <input type="button" class="btn btn-success" value="搜索">
            </div>
            <div class="col-lg-12 col-md-12 col-xs-12"></div>
            <div class="col-lg-8 col-md-8 col-xs-12 top15">
                <div id="map" style="width: 100%;height: 500px;"></div>
            </div>
            <div class="col-lg-4 col-md-4 col-xs-12 top15">
                <textarea class="form-control" rows="20" id="result"></textarea>
            </div>
        </div>

    </div>
</div>
<script>
    //初始化地图对象，加载地图
    var map = new AMap.Map("map", {
        resizeEnable: true
    });
    $(function () {
        map.on('click', showInfoClick);
    });
    var autoOptions = {
        input: "keywords"
    };

    var auto = new AMap.Autocomplete(autoOptions);
    var placeSearch = new AMap.PlaceSearch({
        map: map
    });  //构造地点查询类
    AMap.event.addListener(auto, "select", select);//注册监听，当选中某条记录时会触发
    function select(e) {
        placeSearch.setCity(e.poi.adcode);
        placeSearch.search(e.poi.name);  //关键字查询查询
    }

    function addMarker(lng, lat) {
        marker = new AMap.Marker({
            icon: "//a.amap.com/jsapi_demos/static/demo-center/icons/poi-marker-default.png",
            position: [lng, lat],
            offset: new AMap.Pixel(-25, -60)
        });
        marker.setMap(null);
        marker.setMap(map);
    }

    function showInfoClick(e) {
        var text = "您点击位置坐标:" + e.lnglat.getLng() + ',' + e.lnglat.getLat() + "" + "\r\n" + $('#result').val();
        $('#result').val(text);
        addMarker(e.lnglat.getLng(), e.lnglat.getLat());
    }

    var marker = new AMap.Marker();
    var geocoder = new AMap.Geocoder({
        city: "010",
        radius: 1000
    });

    function regeoCode(lng, lat) {
        var lnglat = (lng + "," + lat).split(',');
        // map.add(marker);
        marker.setPosition(lnglat);
        geocoder.getAddress(lnglat, function (status, result) {
            if (status === 'complete' && result.regeocode) {
                var address = result.regeocode.formattedAddress;
                // document.getElementById('address').value = address;
                return address;
            } else {
                layer.msg('根据经纬度查询地址失败')
            }
        });
    }
</script>

</body>
</html>
