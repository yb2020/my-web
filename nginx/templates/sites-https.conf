# ===========================================
# wuhuhai.com / wuhuhai.cn
# ===========================================
server {
    listen 80;
    listen [::]:80;
    server_name wuhuhai.com wuhuhai.cn www.wuhuhai.com www.wuhuhai.cn wuhuahi.com wuhauhai.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name wuhuhai.com wuhuhai.cn www.wuhuhai.com www.wuhuhai.cn wuhuahi.com wuhauhai.cn;

    ssl_certificate /etc/letsencrypt/live/wuhuhai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wuhuhai.com/privkey.pem;

    root /usr/share/nginx/html/wuhuhai;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html { }
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { }
}

