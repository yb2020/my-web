# 临时 HTTP 配置 — 用于 certbot 验证，拿到证书后再换成 sites.conf

server {
    listen 80;
    listen [::]:80;
    server_name wuhuhai.com wuhuhai.cn www.wuhuhai.com www.wuhuhai.cn wuhuahi.com wuhauhai.cn;
    root /usr/share/nginx/html/wuhuhai;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        try_files $uri $uri/ =404;
    }
    error_page 404 /404.html;
    location = /404.html { }
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { }
}

